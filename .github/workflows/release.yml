# Build ZIP del tema a ogni tag `v*` e lo allega alla GitHub Release.
name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name (es. v0.2.0). Lascia vuoto per build dry-run.'
        type: string
        default: ''

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: PHP syntax lint
        run: |
          find . -type f -name '*.php' -print0 \
            | xargs -0 -r -n1 php -l > /tmp/lint.log 2>&1 || (cat /tmp/lint.log && exit 1)
          echo "✓ PHP syntax OK"

      - name: Build theme ZIP
        id: build
        run: |
          THEME_SLUG="${GITHUB_REPOSITORY##*/}"
          STAGE="/tmp/stage"
          rm -rf "$STAGE" && mkdir -p "$STAGE/$THEME_SLUG"
          rsync -a \
            --exclude='.git/' --exclude='.github/' --exclude='.gitignore' \
            --exclude='.gitattributes' --exclude='.editorconfig' \
            --exclude='node_modules/' --exclude='vendor/' --exclude='build/' \
            --exclude='tests/' --exclude='phpcs.xml*' --exclude='phpstan.neon*' \
            --exclude='phpunit.xml*' --exclude='composer.json' --exclude='composer.lock' \
            --exclude='*.md' \
            ./ "$STAGE/$THEME_SLUG/"
          cd /tmp/stage && zip -qr "/tmp/$THEME_SLUG.zip" "$THEME_SLUG"
          echo "zip_path=/tmp/$THEME_SLUG.zip" >> $GITHUB_OUTPUT
          echo "theme_slug=$THEME_SLUG" >> $GITHUB_OUTPUT
          ls -lh "/tmp/$THEME_SLUG.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.theme_slug }}-zip
          path: ${{ steps.build.outputs.zip_path }}
          retention-days: 90

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.build.outputs.zip_path }}
          generate_release_notes: true
